id: space.rirusha.Cassette.Devel
runtime: org.gnome.Platform
runtime-version: 'master'
sdk: org.gnome.Sdk
command: cassette
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download:ro
modules:
  - name: cassette
    buildsystem: meson
    builddir: true
    config-opts:
      - -Dis_devel=true
    sources:
      - type: dir
        path: ../../
