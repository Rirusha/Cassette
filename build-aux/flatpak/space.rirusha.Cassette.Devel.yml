id: space.rirusha.Cassette.Devel
runtime: org.gnome.Platform
runtime-version: 'master'
sdk: org.gnome.Sdk
command: cassette
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download:ro
  - --own-name=org.mpris.MediaPlayer2.space.rirusha.Cassette.Devel
  - --env=SERIALIZE_UNKNOWN_PROPS=1
  - --env=SERIALIZE_UNKNOWN_FIELDS=1
modules:
  - name: api-base
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libapi-base.git
        branch: main
  - name: libtape
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libtape.git
        branch: main
  - name: cassette
    buildsystem: meson
    builddir: true
    config-opts:
      - -Dnightly=true
    sources:
      - type: dir
        path: ../../
