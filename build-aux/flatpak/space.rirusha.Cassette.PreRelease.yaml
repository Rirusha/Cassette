id: space.rirusha.Cassette
runtime: org.gnome.Platform
runtime-version: 50
sdk: org.gnome.Sdk
command: cassette
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download:ro
build-options:
  append-path: /usr/lib/sdk/vala/bin
  prepend-ld-library-path: /usr/lib/sdk/vala/lib
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/vala
  - '*.a'
modules:
  - name: api-base
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libapi-base.git
        tag: v7.4
        commit:
  - name: libtape
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://gitlab.gnome.org/Rirusha/libtape.git
        tag: v0.3.0
        commit:
  - name: cassette
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://gitlab.gnome.org/Rirusha/Cassette.git
        tag: v0.3.0
        commit:
        x-checker-data:
          tag-pattern: ^v([\d.]+)$
          type: git
