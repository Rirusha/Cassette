id: space.rirusha.Cassette
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: cassette
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download:ro
modules:
  - name: api-base
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libapi-base.git
        tag: v7.4
        commit:
  - name: libtape
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libtape.git
        tag: v0.3.0
        commit:
  - name: cassette
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/Cassette.git
        tag: v0.3.0
        commit:
        x-checker-data:
          tag-pattern: ^v([\d.]+)$
          type: git
