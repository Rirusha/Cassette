id: space.rirusha.CassetteDemo
runtime: org.gnome.Platform
runtime-version: 'master'
sdk: org.gnome.Sdk
command: libcassette-demo
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=wayland
modules:
  - name: cassette-demo
    buildsystem: meson
    builddir: true
    config-opts:
      - -Dlib_only=true
      - -Dinstall_demo=true
    sources:
      - type: dir
        path: ../../
